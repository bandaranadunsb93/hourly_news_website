name: Update News Feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch latest news
        run: npm run update-news

      - name: Commit updated news file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update hourly news feed"
          file_pattern: data/news.json
